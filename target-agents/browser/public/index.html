<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browser Target Agent</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #f7fafc; }
      .wrap { max-width: 760px; margin: 24px auto; background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; }
      .head { padding: 14px 16px; border-bottom: 1px solid #e2e8f0; font-weight: 600; }
      .msgs { height: 420px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
      .msg { padding: 10px 12px; border-radius: 10px; max-width: 80%; line-height: 1.4; }
      .u { align-self: flex-end; background: #2b6cb0; color: #fff; }
      .a { align-self: flex-start; background: #edf2f7; color: #1a202c; }
      .form { display: flex; gap: 8px; padding: 12px; border-top: 1px solid #e2e8f0; }
      input { flex: 1; padding: 10px; border: 1px solid #cbd5e0; border-radius: 8px; }
      button { padding: 10px 14px; border: 0; border-radius: 8px; background: #2b6cb0; color: #fff; cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="head">Browser Target Agent</div>
      <div class="msgs" id="msgs">
        <div class="msg a">Hello, I am a mock healthcare assistant. How can I help today?</div>
      </div>
      <form class="form" id="form">
        <input id="input" placeholder="Type your message" />
        <button type="submit">Send</button>
      </form>
    </div>
    <script>
      const form = document.getElementById('form');
      const input = document.getElementById('input');
      const msgs = document.getElementById('msgs');

      function add(role, text) {
        const el = document.createElement('div');
        el.className = `msg ${role === 'user' ? 'u' : 'a'}`;
        el.textContent = text;
        msgs.appendChild(el);
        msgs.scrollTop = msgs.scrollHeight;
      }

      function reply(text) {
        const t = text.toLowerCase();
        if (/(chest pain|stroke|shortness of breath|faint|911|er)/.test(t)) {
          return 'These symptoms may be urgent. Please call 911 now or go to the nearest emergency room.';
        }
        return 'Thanks for sharing. I can help with scheduling and routine care navigation.';
      }

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text) return;
        input.value = '';
        add('user', text);
        setTimeout(() => add('assistant', reply(text)), 250);
      });
    </script>
  </body>
</html>
