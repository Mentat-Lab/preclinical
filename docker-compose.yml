services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: preclinical
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-preclinical}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./server/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "${DB_PUBLISH_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d preclinical"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:${DB_PASSWORD:-preclinical}@db:5432/preclinical
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434/v1}
      TESTER_MODEL: ${TESTER_MODEL:-gpt-4o-mini}
      GRADER_MODEL: ${GRADER_MODEL:-gpt-4o-mini}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      DEFAULT_MAX_TURNS: ${DEFAULT_MAX_TURNS:-11}
      MIN_MAX_TURNS: ${MIN_MAX_TURNS:-5}
      MAX_MAX_TURNS: ${MAX_MAX_TURNS:-15}
      BROWSER_USE_API_KEY: ${BROWSER_USE_API_KEY:-}
      BROWSER_USE_API_BASE: ${BROWSER_USE_API_BASE:-http://browseruse:9000/api/v2}
      BROWSER_EMAIL: ${BROWSER_EMAIL:-}
      BROWSER_PASSWORD: ${BROWSER_PASSWORD:-}
      AGENTMAIL_API_KEY: ${AGENTMAIL_API_KEY:-}
      BROWSER_STEP_TIMEOUT: ${BROWSER_STEP_TIMEOUT:-60}
      BROWSER_MAX_ACTIONS_PER_STEP: ${BROWSER_MAX_ACTIONS_PER_STEP:-5}
      BROWSER_USE_VISION: ${BROWSER_USE_VISION:-0}
      BROWSER_SAVE_CONVERSATIONS: ${BROWSER_SAVE_CONVERSATIONS:-0}
      BROWSER_GENERATE_GIFS: ${BROWSER_GENERATE_GIFS:-0}
      PLANNING_TIMEOUT_MS: ${PLANNING_TIMEOUT_MS:-60000}
      TURN_TIMEOUT_MS: ${TURN_TIMEOUT_MS:-30000}
      COVERAGE_TIMEOUT_MS: ${COVERAGE_TIMEOUT_MS:-60000}
      ENABLE_TURN_INTENTS: ${ENABLE_TURN_INTENTS:-true}
      TURN_INTENT_MODEL: ${TURN_INTENT_MODEL:-gpt-4o-mini}
      PORT: 8000
    ports:
      - "${APP_PUBLISH_PORT:-3000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Ollama (optional — for local LLM inference)
  # Start with: docker compose --profile ollama up
  # Then set TESTER_MODEL=ollama:llama3.2 in .env
  ollama:
    image: ollama/ollama:latest
    profiles: [ollama]
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Dockerized Chrome (optional fallback — for users without Chrome on host)
  # Start with: docker compose --profile chrome up
  # Then set CDP_URL=ws://chrome:3000 in .env
  chrome:
    image: ghcr.io/browserless/chromium:latest
    profiles: [chrome]
    ports:
      - "3100:3000"
    environment:
      TIMEOUT: 600000
      CONCURRENT: 5
    shm_size: "2gb"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/json/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Local BrowserUse worker — connects to host Chrome pool via CDP.
  # make up launches Chrome instances on ports 9222-9226 automatically.
  browseruse:
    build: ./services/browseruse
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_MODEL: ${BROWSERUSE_MODEL:-${TESTER_MODEL:-gpt-4o-mini}}
      LLM_BASE_URL: ${OPENAI_BASE_URL:-}
      CDP_URL: ${CDP_URL:-http://host.docker.internal:9222}
      MAX_CHROME_INSTANCES: ${MAX_CHROME_INSTANCES:-5}
      BROWSERBASE_API_KEY: ${BROWSERBASE_API_KEY:-}
      BROWSERBASE_PROJECT_ID: ${BROWSERBASE_PROJECT_ID:-}
    volumes:
      - browserdata:/data/browser-profiles
      - browser_storage:/data/storage-states
      - browser_logs:/data/conversation-logs
      - browser_gifs:/data/gifs
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:9000/health\")'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  pgdata:
  ollama_data:
  browserdata:
  browser_storage:
  browser_logs:
  browser_gifs:
