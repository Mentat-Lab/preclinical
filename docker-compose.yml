services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: preclinical
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-preclinical}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./server/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "${DB_PUBLISH_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d preclinical"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:${DB_PASSWORD:-preclinical}@db:5432/preclinical
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TESTER_MODEL: ${TESTER_MODEL:-gpt-4o-mini}
      TESTER_TEMPERATURE: ${TESTER_TEMPERATURE:-0.2}
      GRADER_MODEL: ${GRADER_MODEL:-gpt-4o-mini}
      GRADER_TEMPERATURE: ${GRADER_TEMPERATURE:-0.1}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-10}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-pretty}
      DEFAULT_MAX_TURNS: ${DEFAULT_MAX_TURNS:-11}
      MIN_MAX_TURNS: ${MIN_MAX_TURNS:-5}
      MAX_MAX_TURNS: ${MAX_MAX_TURNS:-15}
      BROWSER_USE_API_KEY: ${BROWSER_USE_API_KEY:-}
      PLANNING_TIMEOUT_MS: ${PLANNING_TIMEOUT_MS:-60000}
      TURN_TIMEOUT_MS: ${TURN_TIMEOUT_MS:-30000}
      COVERAGE_TIMEOUT_MS: ${COVERAGE_TIMEOUT_MS:-60000}
      GRADING_TIMEOUT_MS: ${GRADING_TIMEOUT_MS:-120000}
      ENABLE_TURN_INTENTS: ${ENABLE_TURN_INTENTS:-true}
      TURN_INTENT_MODEL: ${TURN_INTENT_MODEL:-openai-main/gpt-4o-mini}
      ENABLE_RESPONSE_VALIDATION: ${ENABLE_RESPONSE_VALIDATION:-true}
      RESPONSE_VALIDATION_MODEL: ${RESPONSE_VALIDATION_MODEL:-openai-main/gpt-4o-mini}
      RESPONSE_VALIDATION_RETRIES: ${RESPONSE_VALIDATION_RETRIES:-2}
      PORT: 8000
    ports:
      - "${APP_PUBLISH_PORT:-3000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  pgdata:
